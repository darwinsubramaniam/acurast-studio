name: Publish Extension

# Tag-driven releases. The git tag is the single source of truth — it decides
# the channel AND the version. package.json is rewritten in CI to match the tag,
# so you never hand-bump the version before tagging.
#
#   Tag                Channel       package.json   Marketplace        GitHub Release
#   -----------------  ------------  -------------  -----------------  -----------------
#   v0.4.0-rc.1        rc            0.4.0          no                 draft (pre-release)
#   v0.5.0-pre         pre-release   0.5.0          yes (--pre-release) published (pre-release)
#   v0.6.0             stable        0.6.0          yes (stable)       published
#
# Convention (soft-checked, warning only): stable uses an EVEN minor, pre-release
# uses the next ODD minor. RC carries no channel of its own — it mirrors the
# stable/pre version it is a candidate for.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # stable        e.g. v0.6.0
      - 'v[0-9]+.[0-9]+.[0-9]+-pre'    # pre-release   e.g. v0.5.0-pre
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.*'   # rc            e.g. v0.4.0-rc.1

permissions:
  contents: write # Required for creating GitHub Releases and uploading assets

jobs:
  publish:
    name: Build, Package & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      - name: Run Type Checking
        run: npm run typecheck

      # Parse the tag into a channel (rc | pre | stable) and a strict
      # major.minor.patch version. The Marketplace rejects any pre-release
      # suffix in the version field, so the suffix only lives in the git tag.
      - name: Parse Tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          RAW="${TAG#v}"                       # strip leading "v"

          if [[ "$RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\..+$ ]]; then
            CHANNEL=rc
            VERSION="${RAW%-rc.*}"
          elif [[ "$RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+-pre$ ]]; then
            CHANNEL=pre
            VERSION="${RAW%-pre}"
          elif [[ "$RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL=stable
            VERSION="$RAW"
          else
            echo "::error::Unrecognized tag '$TAG'. Expected vX.Y.Z, vX.Y.Z-pre, or vX.Y.Z-rc.N"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Derived version '$VERSION' is not major.minor.patch"
            exit 1
          fi

          # Soft odd/even-minor convention check (warning only, never blocks).
          MINOR="$(echo "$VERSION" | cut -d. -f2)"
          if [[ "$CHANNEL" == "stable" && $((MINOR % 2)) -ne 0 ]]; then
            echo "::warning::Stable release with ODD minor ($VERSION). Convention is EVEN minor for stable."
          fi
          if [[ "$CHANNEL" == "pre" && $((MINOR % 2)) -eq 0 ]]; then
            echo "::warning::Pre-release with EVEN minor ($VERSION). Convention is ODD minor for pre-release."
          fi

          echo "CHANNEL=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag '$TAG' -> channel=$CHANNEL version=$VERSION"

      # Rewrite package.json to the version derived from the tag so the packaged
      # .vsix carries the right number. Ephemeral (CI only) — not committed back.
      - name: Set package.json version
        run: npm pkg set version="${{ steps.tag.outputs.VERSION }}"

      # Stamp the channel + full tag into the manifest so the extension's Home
      # version badge can tell a pre-release/RC from a stable build at runtime.
      # The numeric version can't reveal it — the Marketplace strips the suffix —
      # and VS Code exposes no runtime pre-release flag. Read back in extension.ts
      # via extension.packageJSON.acurastRelease. Ephemeral (CI only).
      - name: Stamp release channel
        run: |
          npm pkg set acurastRelease.channel="${{ steps.tag.outputs.CHANNEL }}"
          npm pkg set acurastRelease.tag="${{ github.ref_name }}"

      # Build & package the .vsix. `vsce package` triggers "vscode:prepublish"
      # (npm run build, which sets esbuild's __ACURAST_DEV_SEED__=false so the
      # demo-seed code is stripped). Pre-release builds get the --pre-release flag.
      - name: Package Extension (.vsix)
        run: |
          if [ "${{ steps.tag.outputs.CHANNEL }}" = "pre" ]; then
            npx @vscode/vsce package --pre-release -o acurast-studio.vsix
          else
            npx @vscode/vsce package -o acurast-studio.vsix
          fi

      # Safety net for every channel (rc/pre/stable): inspect the ACTUAL packaged
      # artifact and fail the release if the demo-seed / recording machinery
      # leaked in. Runs before any publish or release-upload step.
      - name: Verify demo-seed is stripped from the package
        run: |
          unzip -o -q acurast-studio.vsix -d vsix-check
          BUNDLE=vsix-check/extension/dist/extension.js
          if [ ! -f "$BUNDLE" ]; then
            echo "::error::Could not find $BUNDLE in the packaged .vsix"
            exit 1
          fi
          if grep -Eqs 'Recording demo|ACURAST_DEMO_PROJECT_PATH|seedDemoData' "$BUNDLE"; then
            echo "::error::Demo-seed/recording code leaked into the packaged .vsix"
            exit 1
          fi
          echo "OK: demo-seed not present in packaged bundle"
          rm -rf vsix-check

      # RC: testable artifact only — draft GitHub pre-release, never the Marketplace.
      - name: Create Draft GitHub Release (RC)
        if: steps.tag.outputs.CHANNEL == 'rc'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: acurast-studio.vsix
          draft: true
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pre-release: publish the exact built artifact to the Marketplace preview channel.
      - name: Publish Pre-release to Marketplace
        if: steps.tag.outputs.CHANNEL == 'pre'
        run: npx @vscode/vsce publish --pre-release --packagePath acurast-studio.vsix -p ${{ secrets.VSCE_PAT }}

      # Pre-release: also publish a GitHub pre-release with notes + the .vsix so
      # early adopters have a visible changelog (the Marketplace preview channel
      # carries no notes of its own).
      - name: Create GitHub Release (Pre-release)
        if: steps.tag.outputs.CHANNEL == 'pre'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: acurast-studio.vsix
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Stable: publish the exact built artifact + a published GitHub Release with notes.
      - name: Publish Stable to Marketplace
        if: steps.tag.outputs.CHANNEL == 'stable'
        run: npx @vscode/vsce publish --packagePath acurast-studio.vsix -p ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release (Stable)
        if: steps.tag.outputs.CHANNEL == 'stable'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: acurast-studio.vsix
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
