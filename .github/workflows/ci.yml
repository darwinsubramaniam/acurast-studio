name: CI / Build Verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      - name: Run Type Checking
        run: npm run typecheck

      - name: Build Extension
        run: npm run build

      # The demo-seed / recording machinery (src/dev/demoSeed.ts) must be
      # dead-code-eliminated from production builds by esbuild's
      # __ACURAST_DEV_SEED__=false define. Fail early if it ever leaks in.
      - name: Verify demo-seed is stripped from the build
        run: |
          if grep -Eqs 'Recording demo|ACURAST_DEMO_PROJECT_PATH|seedDemoData' dist/extension.js; then
            echo "::error::Demo-seed/recording code leaked into the production build (dist/extension.js)"
            exit 1
          fi
          echo "OK: demo-seed not present in production build"

      - name: Run Tests
        run: xvfb-run -a npm test
